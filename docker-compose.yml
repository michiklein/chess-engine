# Lichess bot: engine + lichess-bot bridge in one container.
#
# On ZimaOS (or any Docker host):
#   LICHESS_BOT_TOKEN=xxxx docker compose up -d --build
# Stop/start anytime from the dashboard or with: docker compose stop / start
services:
  lichess-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    # Stable image name so the ZimaOS app screen can reference it
    image: chess-lichess-bot:latest
    container_name: chess-lichess-bot
    environment:
      - LICHESS_BOT_TOKEN=${LICHESS_BOT_TOKEN:?set LICHESS_BOT_TOKEN}
    restart: unless-stopped
    stop_grace_period: 30s
    # Keep the bot from competing with other services on the host. CPU only
    # burns during games; this cap trades playing strength for quietness.
    # 0.2 cores ~= 5% of a 4-core server (check with nproc; 5% = 0.05 x cores).
    cpus: 0.2
    mem_limit: 512m
