token: "PASTE_YOUR_TOKEN_HERE"     # injected from LICHESS_BOT_TOKEN by entrypoint.sh
url: "https://lichess.org/"

engine:
  dir: "/engine"
  name: "chess_engine"
  protocol: "uci"
  ponder: false                    # the engine does not implement pondering
  silence_stderr: false

  draw_or_resign:
    resign_enabled: false
    offer_draw_enabled: true
    offer_draw_score: 0
    offer_draw_moves: 10
    offer_draw_pieces: 10

abort_time: 30
fake_think_time: false
rate_limiting_delay: 0
move_overhead: 1000                # network + bridge latency buffer per move

challenge:
  concurrency: 1                   # one game at a time
  sort_by: "best"
  accept_bot: true                 # accept bots and humans
  only_bot: false
  max_increment: 180               # any increment Lichess allows
  min_increment: 0
  max_base: 10800                  # any base time Lichess allows (up to 3h)
  min_base: 0
  variants:
    - standard                     # the engine only plays standard chess -
    #                                variants would force illegal moves, so
    #                                do not add chess960/atomic/etc. here
  time_controls:                   # every standard speed (bots can't play ultraBullet)
    - bullet
    - blitz
    - rapid
    - classical
  modes:
    - casual
    - rated

greeting:
  hello: "Hi! I'm {me}, a from-scratch C++ engine. Good luck!"
  goodbye: "Good game if I won, bad game if I lost, boring game if it was a draw."
  hello_spectators: "Hi! I'm {me}, a from-scratch C++ engine."
  goodbye_spectators: "Hope you enjoyed watching :)"

matchmaking:
  allow_matchmaking: true          # auto-challenge other bots when idle
  challenge_timeout: 3             # minutes of idling before it seeks a game
  challenge_initial_time:          # base times it offers (seconds, random pick)
    - 60                           # 1+0 bullet
    - 120                          # 2+1 bullet
    - 180                          # 3+0, 3+2 blitz
    - 300                          # 5+0, 5+3 blitz
  challenge_increment:             # increments it offers (seconds, random pick)
    - 0
    - 1
    - 2
    - 3
  challenge_mode: "rated"          # rated games so the rating establishes
  opponent_rating_difference: 1000
  challenge_filter: coarse         # don't re-spam bots that decline
