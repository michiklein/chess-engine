# ZimaOS/CasaOS app definition for the Lichess bot.
#
# One-time install:
#   1. ZimaOS dashboard -> App Store -> "+" (Install a customized app) ->
#      Import tab -> paste this file's contents
#   2. Replace PASTE_YOUR_TOKEN_HERE with your lichess bot:play token -> Install
# The image is pulled from ghcr.io (built by GitHub Actions on every push).
#
# The app tile then opens the bot's status page, and start/stop on the tile
# takes the bot on/offline.
name: kleinibot
services:
  app:
    # Published automatically by GitHub Actions on every push to main
    image: ghcr.io/michiklein/chess-engine:latest
    container_name: kleinibot
    environment:
      LICHESS_BOT_TOKEN: "PASTE_YOUR_TOKEN_HERE"
    ports:
      - "8087:8087"
    restart: unless-stopped
    cpus: 0.2                       # ~5% of a 4-core host
    mem_limit: 512m
    x-casaos:
      envs:
        - container: LICHESS_BOT_TOKEN
          description:
            en_us: Lichess API token with the bot:play scope
      ports:
        - container: "8087"
          description:
            en_us: Bot status page

x-casaos:
  architectures:
    - amd64
  main: app
  author: michiklein
  category: Games
  developer: michiklein
  icon: https://lichess1.org/assets/logo/lichess-favicon-256.png
  tagline:
    en_us: A from-scratch C++ chess engine playing on Lichess
  description:
    en_us: >-
      kleiniBOT - a from-scratch chess engine running behind the lichess-bot
      bridge. The app page shows live status, ratings, record, and recent
      games. Start/stop the app to take the bot on/offline.
  title:
    en_us: kleiniBOT
  index: /
  port_map: "8087"
  scheme: http
  store_app_id: kleinibot
